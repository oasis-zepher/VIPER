    - python-dotenv==1.0.1
    - PyPDF2==3.0.1
    - chardet==5.2.0

    # === Utilities ===
    - jinja2==3.1.4
    - pydantic==2.9.2
    - tenacity==9.0.0
    - tiktoken==0.8.0
    - aiofiles==24.1.0
