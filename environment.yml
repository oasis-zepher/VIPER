name: viper
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # === Python Core ===
  - python=3.11.9
  - pip=24.0

  # === Data Science ===
  - pandas=2.2.2
  - numpy=1.26.4
  - scipy=1.13.1
  - scikit-learn=1.5.1
  - xgboost=2.0.3
  - statsmodels=0.14.2

  # === Bioinformatics ===
  - biopython=1.83

  # === R Language ===
  - r-base=4.3.3
  - r-wgcna=1.72.5
  - r-ggplot2=3.5.1
  - r-dplyr=1.1.4
  - r-tidyverse=2.0.0
  - r-limma=3.58.1
  - r-pheatmap=1.0.12
  - r-corrplot=0.92
  - r-devtools=2.4.5
  - r-biocmanager=1.30.23
  - r-enrichplot=1.22.0
  - r-clusterprofiler=4.10.0
  - r-org.hs.eg.db=3.18.0
  - r-survival=3.5.8
  - r-survminer=0.4.9
  - r-glmnet=4.1.8
  - r-caret=6.0.94
